name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # needed to create a Release when a v* tag is pushed

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macOS is omitted for now: the maker-dmg needs the macOS-only optional
        # dep `appdmg` (absent from a Windows-generated lockfile) and a signed
        # build needs the APPLE_* secrets. Re-add 'macos-latest' once those are
        # sorted. The stylus feature itself is Windows-only in v1.
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - run: npm ci

      # --no-sign skips macOS code-signing/notarization so CI needs no certs.
      # For signed release builds, drop --no-sign and provide the APPLE_* secrets.
      - name: Build installers
        run: npm run make -- --no-sign

      - name: Upload installers as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drawpen-${{ matrix.os }}
          path: out/make/**/*
          if-no-files-found: error

      - name: Attach installers to GitHub Release (on v* tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/**/*
